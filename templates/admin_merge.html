{% extends 'base.html' %}
{% block title %}Admin Merge Trips - Bus Booking System{% endblock %}
{% block content %}
<div class="card">
  <h2>Merge Trips</h2>
  <p>Select two different active trips to combine when the system load is low.</p>
</div>

<div class="card">
  <form method="post">
    <label>Target Trip</label>
    <select name="target_trip_id" required>
      <option value="">Choose the trip to keep</option>
      {% for trip in trips %}
      <option value="{{ trip.id }}">{{ trip.id }} — {{ trip.trip_date }} — Bus {{ trip.bus_id }} — {{ trip.system_status }}</option>
      {% endfor %}
    </select>

    <label>Source Trip</label>
    <select name="source_trip_id" required>
      <option value="">Choose the trip to merge</option>
      {% for trip in trips %}
      <option value="{{ trip.id }}">{{ trip.id }} — {{ trip.trip_date }} — Bus {{ trip.bus_id }} — {{ trip.system_status }}</option>
      {% endfor %}
    </select>

    <button class="button" type="submit">Merge Trips</button>
  </form>
</div>
{% endblock %}
